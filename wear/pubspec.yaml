name: gyawun_wear
description: Gyawun Music Wear OS companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  gyawun_shared:
    path: ../packages/gyawun_shared
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.14
  flutter_wear_os_connectivity: ^1.0.0
  wear_plus: ^1.0.0
  wearable_rotary: ^0.3.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  get_it: ^8.0.3
  provider: ^6.1.2
  path_provider: ^2.1.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
